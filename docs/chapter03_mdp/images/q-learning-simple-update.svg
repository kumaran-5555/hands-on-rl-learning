<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <g font-family="Arial, 'Noto Sans SC', sans-serif">
    <!-- Grid border -->
    <rect x="0" y="0" width="360" height="360" fill="none" stroke="#334155" stroke-width="2"/>

    <!-- Grid lines (3 vertical + 3 horizontal = 4x4) -->
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="90" y1="0" x2="90" y2="360"/>
      <line x1="180" y1="0" x2="180" y2="360"/>
      <line x1="270" y1="0" x2="270" y2="360"/>
      <line x1="0" y1="90" x2="360" y2="90"/>
      <line x1="0" y1="180" x2="360" y2="180"/>
      <line x1="0" y1="270" x2="360" y2="270"/>
    </g>

    <!-- Highlight (0,0) cell: row 0, col 0 -->
    <rect x="0" y="0" width="90" height="90" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
    <text x="45" y="40" text-anchor="middle" font-size="11" fill="#92400e">(0,0)</text>
    <text x="45" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">起点</text>
    <text x="45" y="76" text-anchor="middle" font-size="10" fill="#b45309">旧 Q=0</text>

    <!-- Highlight (0,1) cell: row 0, col 1 -->
    <rect x="90" y="0" width="90" height="90" fill="#dbeafe" stroke="#334155" stroke-width="2"/>
    <text x="135" y="40" text-anchor="middle" font-size="11" fill="#1e40af">(0,1)</text>
    <text x="135" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">s'</text>
    <text x="135" y="76" text-anchor="middle" font-size="10" fill="#2563eb">max Q=0</text>

    <!-- Arrow from (0,0) to (0,1) -->
    <line x1="78" y1="45" x2="102" y2="45" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="90" y="38" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">右</text>
    <rect x="72" y="50" width="36" height="16" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
    <text x="90" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">r=-1</text>

    <!-- Goal cell (3,3): row 3, col 3 -->
    <rect x="270" y="270" width="90" height="90" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
    <text x="315" y="300" text-anchor="middle" font-size="11" fill="#166534">(3,3)</text>
    <text x="315" y="325" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">G</text>

    <!-- Dim cell labels -->
    <g fill="#cbd5e1" font-size="10" text-anchor="middle">
      <text x="225" y="45">(0,2)</text>
      <text x="315" y="45">(0,3)</text>
      <text x="45" y="135">(1,0)</text>
      <text x="135" y="135">(1,1)</text>
      <text x="225" y="135">(1,2)</text>
      <text x="315" y="135">(1,3)</text>
      <text x="45" y="225">(2,0)</text>
      <text x="135" y="225">(2,1)</text>
      <text x="225" y="225">(2,2)</text>
      <text x="315" y="225">(2,3)</text>
      <text x="45" y="315">(3,0)</text>
      <text x="135" y="315">(3,1)</text>
      <text x="225" y="315">(3,2)</text>
    </g>
  </g>
</svg>
